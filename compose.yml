services: 

  api:
    build: ./server
    ports:
      - 3000:3000
    depends_on:
      - db
    environment:
    - POSTGRES_PASSWORD=supersecret

  client:
    build: ./client
    ports:
      - 5173:5173
    depends_on:
      - db

  db:
    image: postgres
    volumes:
      - /var/lib/postgresql 
    environment:
    - POSTGRES_PASSWORD=supersecret


      