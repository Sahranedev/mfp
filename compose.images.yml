services:
  api:
    image: ghcr.io/sahranedev/mfp/mfp-server:latest
    pull_policy: always
    ports:
      - 3000:3000
    depends_on:
      - db
    environment:
      - POSTGRES_PASSWORD=supersecret

  client:
    image: ghcr.io/sahranedev/mfp/mfp-client:latest
    pull_policy: always
    ports:
      - 5173:5173
    depends_on:
      - api

  db:
    image: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=supersecret

volumes:
  db-data:
